aid: spline
url: https://raw.githubusercontent.com/api-evangelist/spline/refs/heads/main/apis.yml
name: Spline
x-type: company
description: >-
  Spline is a real-time collaborative 3D design tool with AI-driven object generation, web
  embedding, and animation. Spline does NOT publish a REST API for 3D scene generation as of
  May 2026; instead it exposes Code APIs (Web, SwiftUI, Kotlin) for embedding scenes, plus a
  real-time API for variables/data and webhooks for event-driven integrations.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - 3D
  - Design
  - AI
  - Collaboration
  - Web
  - SDK
