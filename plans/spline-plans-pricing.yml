specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Spline
providerId: spline
created: '2026-05-08'
modified: '2026-05-08'
reconciled: partial
tags:
- 3D
- Design
- AI
- Collaboration
- Web
- Plans
description: >-
  Spline is sold as seat-based design subscriptions (Free / Super / Super Team / Enterprise)
  rather than per-API-call pricing. SDK Code APIs and webhooks are included with all paid
  tiers; AI generation features may have credit limits per tier.
notes: Spline's product is a designer subscription; APIs are bundled with seats.
sources:
- https://spline.design/pricing
plans:
- id: spline-free
  name: Free
  type: free
  description: Free designer tier with limited collaboration and SDK use.
  entries:
  - label: Plan Fee
    name: plan_fee
    type: flat
    metric: month
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 0 USD/month
    userMultiplied: false
- id: spline-super
  name: Super
  type: subscription
  description: Paid individual creator tier; unlocks more AI credits and SDK features.
  entries:
  - label: Plan Fee
    name: plan_fee
    type: subscription
    metric: month
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: see spline.design/pricing
    userMultiplied: true
- id: spline-team
  name: Super Team
  type: subscription
  description: Team tier with shared workspaces and seat-based billing.
  entries:
  - label: Plan Fee
    name: plan_fee
    type: subscription
    metric: month
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: see spline.design/pricing
    userMultiplied: true
- id: spline-enterprise
  name: Enterprise
  type: enterprise
  description: Custom contracts with SSO/SAML and centralized administration.
  entries:
  - label: Enterprise Contract
    name: enterprise
    type: flat
    metric: contract
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
