description: >-
  FOCUS-aligned FinOps view of Spline. Spline bills as seat-based design subscriptions with
  bundled SDK access. There is no per-API-call line item; FinOps centers on right-sizing
  designer seats and tracking AI credit consumption per plan.
notes: Designer seat sizing is the primary cost lever; SDK embedding does not generate per-call charges directly.
