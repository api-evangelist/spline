principles:
- name: Visibility
  description: Track designer seats and AI credit burn in Spline workspace billing.
- name: Allocation
  description: Allocate seats to design teams; tag scenes to consuming product surfaces.
- name: Optimization
  description: Right-size seat count; downgrade idle designers.
- name: Accountability
  description: Assign workspace admin to manage seat sprawl.
