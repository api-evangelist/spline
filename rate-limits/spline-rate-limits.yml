specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Spline
providerId: spline
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
- 3D
- Design
- AI
- Collaboration
- Web
- Rate Limiting
- Quotas
- Throttling
description: >-
  Spline does not publish a public REST API for 3D generation, so per-RPS rate limits do not
  apply. SDK code APIs and webhooks are governed by the user's plan-based AI credit
  allowances and project export limits.
notes: Re-research Spline once a public REST generation API ships.
sources:
- https://docs.spline.design/
responseCodes:
  throttled: 429
limits:
- name: AI Credits (Plan-Based)
  scope: account
  metric: ai_credits
  limit: see plan tier
  notes: AI generation features are gated by per-plan credit allowances.
- name: SDK Embed Usage
  scope: account
  metric: scenes
  limit: see plan tier
policies:
- name: Backoff Strategy
  description: Clients embedding Spline scenes via SDK should retry with exponential backoff on transient load.
- name: Plan Choice
  description: Choose Super / Team / Enterprise based on AI credit and seat needs.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
